<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopstepX 當沖交易戰情室</title>
    
    <!-- 引入 React 和 ReactDOM (傳統同步加載) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 同步引入 Firebase v10 Compat SDK (徹底避開 import 語法衝突) -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <script>
        // --- 您的 Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAtcxHLphNwIWxcQ_7EP-wxJDmk1pVgMYI",
            authDomain: "trading-station-7cdbd.firebaseapp.com",
            projectId: "trading-station-7cdbd",
            storageBucket: "trading-station-7cdbd.firebasestorage.app",
            messagingSenderId: "574547874669",
            appId: "1:574547874669:web:018583e4a775c647b9c064",
            measurementId: "G-F1ZEBQMFG4"
        };

        const app = firebase.initializeApp(firebaseConfig);
        window.fbDb = firebase.firestore();
        window.fbAuth = firebase.auth();
        window.appId = "trading-v4-app"; 
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        body { background-color: #020617; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 共用 Icons (深度壓縮以防截斷) ---
        const Ic = ({d, c="currentColor", sz=24, cls=""}) => <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cls}><path d={d}/></svg>;
        const Icons = {
            Chart: (p) => <Ic d="M22 12h-4l-3 9L9 3l-3 9H2" {...p}/>,
            Dollar: (p) => <Ic d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" {...p}/>,
            Lock: (p) => <Ic d="M3 11h18v11H3z M7 11V7a5 5 0 0 1 10 0v4" {...p}/>,
            Trash: (p) => <Ic d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M10 11v6 M14 11v6" {...p}/>,
            Pie: (p) => <Ic d="M21.21 15.89A10 10 0 1 1 8 2.83 M22 12A10 10 0 0 0 12 2v10z" {...p}/>,
            Edit: (p) => <Ic d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" {...p}/>,
            Check: (p) => <Ic d="M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01 9 11.01" {...p}/>,
            Target: (p) => <Ic d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" {...p}/>,
            List: (p) => <Ic d="M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01" {...p}/>,
            Bar: (p) => <Ic d="M18 20V10 M12 20V4 M6 20v-6" {...p}/>,
            Pig: (p) => <Ic d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.7-1 2-2.5V5z M2 9v1c0 1.1.9 2 2 2h1 M16 11h.01" {...p}/>,
            Arrow: (p) => <Ic d="M5 12h14 M12 5l7 7-7 7" {...p}/>,
            Trend: (p) => <Ic d="M23 6l-9.5 9.5-5-5L1 18 M17 6h6v6" {...p}/>,
            Info: (p) => <Ic d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 16v-4 M12 8h.01" {...p}/>,
            Plus: (p) => <Ic d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 8v8 M8 12h8" {...p}/>,
            Minus: (p) => <Ic d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M8 12h8" {...p}/>
        };

        // --- Formatters ---
        const formatTWD = (val) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(val || 0);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val || 0);
        const formatNumber = (val) => { if (!val || isNaN(val)) return '--'; const num = parseFloat(val); return Number.isInteger(num) ? num.toString() : num.toFixed(2); };

        // --- UI 元件 ---
        const Inp = ({ lbl, val, set, type="number", ph="", cls="w-full" }) => (
            <div className={`flex flex-col ${cls}`}>
                <label className="text-[10px] text-slate-400 mb-0.5">{lbl}</label>
                <input type={type} value={val} onChange={e=>set(e.target.value)} className="bg-slate-700 text-white text-sm border border-slate-600 rounded px-2 py-1 outline-none focus:border-blue-500" placeholder={ph} />
            </div>
        );

        const PatternCard = ({ title, svg, inputs, results, isGrid=true }) => (
            <div className="bg-slate-800 rounded-lg border border-slate-700 p-3 shadow-lg flex flex-col h-full">
                <div className="flex flex-col items-center justify-center bg-slate-900 rounded p-2 border border-slate-800 mb-3">
                    <h3 className="text-sm font-bold text-slate-200 mb-1">{title}</h3>
                    <div className="w-full h-20 flex items-center justify-center">{svg}</div>
                </div>
                <div className="flex-1 flex flex-col justify-between space-y-2">
                    <div className="space-y-2">{inputs.map((inp, i) => <Inp key={i} lbl={inp.l} val={inp.v} set={inp.s} />)}</div>
                    <div className="pt-2 border-t border-slate-700 mt-2">
                        {isGrid ? (
                            <div className="grid grid-cols-2 gap-2">
                                {results.map((res, i) => (
                                    <div key={i} className={`flex flex-col items-center p-1.5 rounded border ${res.hl ? 'bg-purple-900/20 border-purple-500/30 text-purple-300' : 'bg-blue-900/20 border-blue-500/20 text-blue-300'}`}>
                                        <span className="text-[10px] font-medium mb-0.5">{res.l}</span>
                                        <span className={`text-sm font-bold ${res.hl ? 'text-purple-100' : 'text-white'}`}>{formatNumber(res.v)}</span>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-1">
                                <div className="text-[10px] text-center text-slate-500 mb-1">關鍵價位 (Key Levels)</div>
                                {results.map((res, i) => (
                                    <div key={i} className={`flex justify-between items-center px-2 py-1 rounded border ${res.hl ? 'bg-yellow-900/20 border-yellow-500/30 text-yellow-400 font-bold' : 'bg-slate-900/40 border-slate-700/50 text-slate-400'}`}>
                                        <span className="text-[10px] truncate pr-2">{res.l}</span>
                                        <span className={`text-sm font-bold ${res.hl ? 'text-yellow-200' : 'text-slate-200'}`}>{formatNumber(res.v)}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );

        // --- MNQ 加減碼 ---
        const PositionManager = () => {
            const [cLots, setCLots] = useState(''); const [cCost, setCCost] = useState('');
            const [aLots, setALots] = useState(''); const [aPrice, setAPrice] = useState('');
            const [mode, setMode] = useState('add');
            
            const { newAvg, pnl } = useMemo(() => {
                if(!cLots||!cCost||!aLots||!aPrice) return {newAvg:null, pnl:null};
                const cl=parseFloat(cLots), cc=parseFloat(cCost), al=parseFloat(aLots), ap=parseFloat(aPrice);
                if(mode==='add') return {newAvg: (cl*cc + al*ap)/(cl+al), pnl:null};
                return {newAvg:null, pnl: (ap-cc)*al*2};
            }, [cLots, cCost, aLots, aPrice, mode]);

            return (
                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg mt-6">
                    <h3 className="text-lg font-bold text-white mb-4 flex items-center"><Icons.Trend cls="mr-2 text-orange-400" sz={20}/> Step 2: 加/減碼 成本試算</h3>
                    <div className="flex space-x-4 mb-4">
                        <button onClick={()=>setMode('add')} className={`flex-1 py-2 rounded flex items-center justify-center font-bold text-sm ${mode==='add'?'bg-orange-600 text-white':'bg-slate-700 text-slate-400'}`}><Icons.Plus sz={16} cls="mr-2"/> 加碼</button>
                        <button onClick={()=>setMode('reduce')} className={`flex-1 py-2 rounded flex items-center justify-center font-bold text-sm ${mode==='reduce'?'bg-indigo-600 text-white':'bg-slate-700 text-slate-400'}`}><Icons.Minus sz={16} cls="mr-2"/> 減碼</button>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-900/50 p-3 rounded border border-slate-700 space-y-2">
                            <h4 className="text-xs text-slate-500 font-bold mb-1">目前持倉</h4>
                            <Inp lbl="目前口數" val={cLots} set={setCLots} />
                            <Inp lbl="目前成本" val={cCost} set={setCCost} />
                        </div>
                        <div className={`bg-slate-900/50 p-3 rounded border ${mode==='add'?'border-orange-500/30':'border-indigo-500/30'} space-y-2`}>
                            <h4 className="text-xs text-slate-500 font-bold mb-1">{mode==='add'?'加碼進場':'部分出場'}</h4>
                            <Inp lbl={mode==='add'?'加碼口數':'賣出口數'} val={aLots} set={setALots} />
                            <Inp lbl={mode==='add'?'加碼價格':'賣出價格'} val={aPrice} set={setAPrice} />
                        </div>
                    </div>
                    <div className="mt-4 pt-4 border-t border-slate-700">
                        {mode==='add' ? 
                            <div className="flex justify-between items-center bg-orange-900/20 p-3 rounded border border-orange-500/30"><span className="text-sm text-orange-200">新平均成本</span><span className="text-2xl font-bold text-orange-400">{formatNumber(newAvg)}</span></div> : 
                            <div className="flex justify-between items-center bg-indigo-900/20 p-3 rounded border border-indigo-500/30"><span className="text-sm text-indigo-200">實現損益</span><span className={`text-2xl font-bold ${pnl>=0?'text-green-400':'text-red-400'}`}>{pnl!==null?(pnl>=0?`+$${formatNumber(pnl)}`:`-$${formatNumber(Math.abs(pnl))}`):'--'}</span></div>
                        }
                    </div>
                </div>
            );
        };

        const MNQCalculator = () => {
            const [c, setC] = useState(''); const [cp, setCp] = useState(''); const [tp, setTp] = useState('');
            const [cpr, setCpr] = useState(''); const [dp, setDp] = useState('');
            
            const profit = (cp && tp && c) ? (parseFloat(tp)-parseFloat(cp))*parseFloat(c)*2 : null;
            const target = (cpr && dp && c) ? parseFloat(cpr)+(parseFloat(dp)/(parseFloat(c)*2)) : null;

            return (
                <div className="space-y-6">
                    <div className="bg-yellow-900/20 border border-yellow-700/50 p-4 rounded-lg flex items-start space-x-3">
                        <Icons.Info cls="text-yellow-500 flex-shrink-0 mt-0.5" sz={20}/>
                        <div className="text-sm text-yellow-200 font-bold">MNQ 參數：1 點 = $2 USD</div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                            <h3 className="text-sm font-bold text-green-400 mb-3">Step 1: 基礎設定</h3>
                            <Inp lbl="口數 (Lots)" val={c} set={setC} />
                            <div className="mt-2 text-xs text-slate-400">1 點波動 = <span className="text-green-400 font-bold">${c?(parseFloat(c)*2).toFixed(1):0}</span></div>
                        </div>
                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                            <h3 className="text-sm font-bold text-blue-400 mb-3">獲利試算</h3>
                            <div className="flex gap-2"><Inp lbl="成本" val={cp} set={setCp}/><Inp lbl="出場" val={tp} set={setTp}/></div>
                            <div className="mt-2 text-right text-lg font-bold text-slate-200">{profit ? `$${formatNumber(profit)}` : '--'}</div>
                        </div>
                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                            <h3 className="text-sm font-bold text-purple-400 mb-3">目標反推</h3>
                            <div className="flex gap-2"><Inp lbl="成本" val={cpr} set={setCpr}/><Inp lbl="想賺$" val={dp} set={setDp}/></div>
                            <div className="mt-2 text-right text-lg font-bold text-slate-200">{target ? formatNumber(target) : '--'}</div>
                        </div>
                    </div>
                    <PositionManager />
                </div>
            );
        };

        // --- 雲端帳務明細元件 ---
        const JournalEntries = ({ records, onSave, onDel }) => {
            const [editId, setEditId] = useState(null);
            const [f, setF] = useState({ type:'cost', date:'', acc:'Topstep 考試帳號', amt:'', uAmt:'', uFee:'', pSplit:'', rate:'', tFee:'', remDate:'' });

            const sorted = useMemo(() => [...records].sort((a,b)=>new Date(b.date)-new Date(a.date)), [records]);

            const submit = async () => {
                if(!f.date) return alert("請輸入日期");
                const data = { type: f.type, date: f.date };
                if (f.type==='cost') {
                    if(!f.amt) return alert("請輸入金額");
                    data.accountType = f.acc; data.amount = parseFloat(f.amt);
                } else {
                    if(!f.uAmt) return alert("請輸入 USD 金額");
                    data.usdAmount = parseFloat(f.uAmt); data.usdFee = parseFloat(f.uFee)||0;
                    data.profitSplit = parseFloat(f.pSplit)||0; data.exchangeRate = parseFloat(f.rate)||null;
                    data.twdFee = parseFloat(f.tFee)||0; data.remittanceDate = f.remDate||null;
                }
                await onSave(editId, data);
                setEditId(null); setF({ type:f.type, date:'', acc:'Topstep 考試帳號', amt:'', uAmt:'', uFee:'', pSplit:'', rate:'', tFee:'', remDate:'' });
            };

            const loadEdit = (r) => {
                setEditId(r.id); 
                setF({ type:r.type, date:r.date, acc:r.accountType||'Topstep 考試帳號', amt:r.amount||'', uAmt:r.usdAmount||'', uFee:r.usdFee||'', pSplit:r.profitSplit||'', rate:r.exchangeRate||'', tFee:r.twdFee||'', remDate:r.remittanceDate||'' });
                document.getElementById('j-form').scrollIntoView({behavior:'smooth'});
            };

            return (
                <div className="space-y-6">
                    <div id="j-form" className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                        <div className="flex border-b border-slate-700">
                            <button onClick={()=>{setEditId(null); setF({...f, type:'cost'});}} className={`flex-1 py-3 text-sm font-bold flex items-center justify-center ${f.type==='cost'?'bg-red-900/20 text-red-400 border-b-2 border-red-500':'text-slate-400 hover:bg-slate-700'}`}><Icons.Minus sz={16} cls="mr-2"/>紀錄成本</button>
                            <button onClick={()=>{setEditId(null); setF({...f, type:'withdraw'});}} className={`flex-1 py-3 text-sm font-bold flex items-center justify-center ${f.type==='withdraw'?'bg-green-900/20 text-green-400 border-b-2 border-green-500':'text-slate-400 hover:bg-slate-700'}`}><Icons.Plus sz={16} cls="mr-2"/>紀錄出金</button>
                        </div>
                        <div className="p-4 bg-slate-900/30">
                            {f.type === 'cost' ? (
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                                    <Inp lbl="購買日期" type="date" val={f.date} set={v=>setF({...f, date:v})} />
                                    <div className="flex flex-col"><label className="text-[10px] text-slate-400 mb-0.5">帳戶型態</label>
                                        <select value={f.acc} onChange={e=>setF({...f, acc:e.target.value})} className="bg-slate-700 text-white text-sm border border-slate-600 rounded px-2 py-1"><option>Topstep 考試帳號</option><option>Topstep 真實帳號</option><option>其他平台費用</option></select>
                                    </div>
                                    <Inp lbl="金額 (TWD)" val={f.amt} set={v=>setF({...f, amt:v})} ph="1500" />
                                    <button onClick={submit} className="h-[30px] bg-red-600 hover:bg-red-500 rounded font-bold text-white text-sm">{editId?'更新':'新增'}</button>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <Inp lbl="申請日期" type="date" val={f.date} set={v=>setF({...f, date:v})} />
                                        <Inp lbl="出金 (USD)" val={f.uAmt} set={v=>setF({...f, uAmt:v})} cls="text-green-400 font-bold" />
                                        <Inp lbl="手續費 (USD)" val={f.uFee} set={v=>setF({...f, uFee:v})} ph="選填" />
                                        <Inp lbl="分潤 (USD)" val={f.pSplit} set={v=>setF({...f, pSplit:v})} ph="選填" />
                                    </div>
                                    <div className="border-t border-slate-700 pt-3 grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-800/50 p-3 rounded">
                                        <div className="md:col-span-4 text-xs text-blue-300 font-bold mb-1 flex items-center"><Icons.Info sz={12} cls="mr-1"/> 款項入帳後補填</div>
                                        <Inp lbl="解款日期" type="date" val={f.remDate} set={v=>setF({...f, remDate:v})} />
                                        <Inp lbl="匯率" val={f.rate} set={v=>setF({...f, rate:v})} ph="31.5" />
                                        <Inp lbl="解款手續費 (TWD)" val={f.tFee} set={v=>setF({...f, tFee:v})} />
                                        <button onClick={submit} className="h-[30px] bg-green-600 hover:bg-green-500 rounded font-bold text-white mt-auto text-sm">{editId?'更新':'新增'}</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="bg-slate-800 rounded-xl border border-slate-700 overflow-x-auto">
                        <table className="w-full text-sm text-left text-slate-300">
                            <thead className="text-xs text-slate-500 uppercase bg-slate-900/50"><tr><th className="px-4 py-3">日期</th><th className="px-4 py-3">類型</th><th className="px-4 py-3">狀態</th><th className="px-4 py-3 text-right">估算 (TWD)</th><th className="px-4 py-3 text-center">操作</th></tr></thead>
                            <tbody className="divide-y divide-slate-700">
                                {sorted.map(r => {
                                    let dA='', st='';
                                    if(r.type==='cost'){ dA=`-${formatTWD(r.amount)}`; st=r.accountType; }
                                    else{
                                        if(r.remittanceDate && r.exchangeRate){
                                            const netUSD = r.usdAmount - r.usdFee - r.profitSplit;
                                            dA = `+${formatTWD(netUSD*r.exchangeRate - r.twdFee)}`;
                                            st = <span className="text-green-400 flex items-center gap-1"><Icons.Check sz={12}/>已解款({r.remittanceDate})</span>;
                                        } else {
                                            dA = <span className="text-slate-500 italic">待結(USD {r.usdAmount})</span>;
                                            st = <span className="text-yellow-500 italic">申請中</span>;
                                        }
                                    }
                                    return (
                                        <tr key={r.id} className="hover:bg-slate-700/50">
                                            <td className="px-4 py-3">{r.date}</td>
                                            <td className="px-4 py-3"><span className={`px-2 py-0.5 rounded text-[10px] ${r.type==='cost'?'bg-red-900/30 text-red-400 border border-red-500/30':'bg-green-900/30 text-green-400 border border-green-500/30'}`}>{r.type==='cost'?'投入':'出金'}</span></td>
                                            <td className="px-4 py-3 text-xs">{st}</td>
                                            <td className={`px-4 py-3 text-right font-mono ${r.type==='cost'?'text-red-300':'text-green-300'}`}>{dA}</td>
                                            <td className="px-4 py-3 flex justify-center gap-3">
                                                <button onClick={()=>loadEdit(r)} className="text-slate-400 hover:text-blue-400"><Icons.Edit sz={14}/></button>
                                                <button onClick={()=>{if(window.confirm('確定刪除?')) onDel(r.id);}} className="text-slate-400 hover:text-red-400"><Icons.Trash sz={14}/></button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const JournalAnalysis = ({ records }) => {
            const st = useMemo(() => {
                let cost=0, net=0, uTot=0;
                records.forEach(r => {
                    if(r.type==='cost') cost+=(parseFloat(r.amount)||0);
                    else if(r.type==='withdraw'){
                        uTot+=(parseFloat(r.usdAmount)||0);
                        if(r.remittanceDate && r.exchangeRate){
                            let nU = (parseFloat(r.usdAmount)||0)-(parseFloat(r.usdFee)||0)-(parseFloat(r.profitSplit)||0);
                            net += (nU*parseFloat(r.exchangeRate))-(parseFloat(r.twdFee)||0);
                        }
                    }
                });
                const pnl = net - cost;
                return { cost, net, uTot, pnl, roi: cost>0 ? (pnl/cost)*100 : (net>0?100:0) };
            }, [records]);

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg space-y-4">
                        <h3 className="text-lg font-bold text-white flex items-center"><Icons.Bar sz={20} cls="mr-2 text-blue-400"/>財務總覽</h3>
                        <div className="flex justify-between border-b border-slate-700 pb-2"><span className="text-sm text-slate-400">總投入</span><span className="text-xl font-bold">{formatTWD(st.cost)}</span></div>
                        <div className="flex justify-between border-b border-slate-700 pb-2"><span className="text-sm text-slate-400">實質獲利</span><span className="text-xl font-bold text-green-400">{formatTWD(st.net)}</span></div>
                        <div className="flex justify-between pt-1"><span className="text-sm text-slate-400">淨損益</span><span className={`text-2xl font-bold ${st.pnl>=0?'text-blue-400':'text-red-400'}`}>{st.pnl>0?'+':''}{formatTWD(st.pnl)}</span></div>
                    </div>
                    <div className="grid gap-4">
                        <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col items-center justify-center">
                            <h4 className="text-sm text-slate-400 mb-2">ROI (投資報酬率)</h4>
                            <div className="w-28 h-28 rounded-full border-4 border-slate-700 flex items-center justify-center"><span className={`text-xl font-bold ${st.roi>=0?'text-purple-400':'text-red-400'}`}>{st.roi.toFixed(1)}%</span></div>
                        </div>
                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center"><span className="text-sm text-slate-400">累積出金申請</span><span className="text-lg font-bold text-yellow-400">{formatUSD(st.uTot)}</span></div>
                    </div>
                </div>
            );
        };

        const JournalGoals = ({ records }) => {
            const yr = new Date().getFullYear();
            const mos = Array.from({length:12},(_,i)=>i+1);
            const { mData, bonus } = useMemo(() => {
                const md = {}; let b=0;
                mos.forEach(m => md[m]={ cCnt:0, cAmt:0, wCnt:0, net:0 });
                records.forEach(r => {
                    const d = new Date(r.date);
                    if(d.getFullYear() === yr){
                        const m = d.getMonth()+1;
                        if(r.type==='cost'){ md[m].cCnt++; md[m].cAmt+=(parseFloat(r.amount)||0); }
                        else if(r.type==='withdraw'){
                            md[m].wCnt++;
                            if(r.remittanceDate && r.exchangeRate) {
                                let nu = (parseFloat(r.usdAmount)||0)-(parseFloat(r.usdFee)||0)-(parseFloat(r.profitSplit)||0);
                                md[m].net += (nu*parseFloat(r.exchangeRate))-(parseFloat(r.twdFee)||0);
                            }
                        }
                    }
                });
                mos.forEach(m => {
                    if(md[m].cCnt<5 && (md[m].net - md[m].cAmt)>=180000) b+=20000;
                });
                return { mData: md, bonus: b };
            }, [records, yr]);

            const trgt = 60000; const prg = Math.min((bonus/trgt)*100, 100);
            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-r from-pink-900/40 to-purple-900/40 border border-pink-500/30 rounded-xl p-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-10"><Icons.Pig sz={120}/></div>
                        <div className="flex flex-col md:flex-row items-center gap-6 relative z-10">
                            <div className={`w-20 h-20 rounded-full flex justify-center items-center border-4 shadow-lg ${bonus>=trgt?'bg-yellow-500 border-yellow-300 animate-bounce-slow':'bg-slate-800 border-pink-400'}`}><Icons.Pig sz={40} cls={bonus>=trgt?'text-white':'text-pink-400'}/></div>
                            <div className="flex-1 w-full">
                                <h3 className="text-lg font-bold text-white flex gap-2">旅遊公積金 {bonus>=trgt && <span className="bg-yellow-500 text-black text-[10px] px-2 py-0.5 rounded-full font-bold animate-pulse">準備出國囉! ✈️</span>}</h3>
                                <p className="text-[10px] text-pink-300 mb-2">投入 &lt; 5次 且 淨利 &ge; $180,000，撥入 $20,000</p>
                                <div className="flex justify-between items-end mb-1"><span className="text-xl font-bold">{formatTWD(bonus)}</span><span className="text-xs text-slate-400">目標: {formatTWD(trgt)}</span></div>
                                <div className="w-full bg-slate-800 rounded-full h-3"><div className={`h-full rounded-full transition-all duration-1000 ${bonus>=trgt?'bg-gradient-to-r from-yellow-400 to-orange-500':'bg-gradient-to-r from-pink-500 to-purple-500'}`} style={{width:`${prg}%`}}></div></div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div className="flex justify-between items-end mb-3"><h3 className="text-md font-bold text-white flex items-center"><Icons.Target sz={16} cls="mr-2 text-red-400"/> {yr} 出金挑戰</h3><span className="text-[10px] text-slate-400">目標: 4次/月</span></div>
                        <div className="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                            {mos.map(m => {
                                const cnt = mData[m].wCnt; const met = cnt>=4;
                                return (
                                    <div key={m} className={`p-3 rounded-lg border ${met?'bg-green-900/20 border-green-500/50 shadow-[0_0_10px_rgba(34,197,94,0.2)]':'bg-slate-800 border-slate-700'}`}>
                                        <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-slate-300">{m}月</span>{met && <Icons.Check sz={12} cls="text-green-400"/>}</div>
                                        <div className="flex gap-1 justify-center">{[1,2,3,4].map(s=><div key={s} className={`w-2 h-6 rounded-sm ${s<=cnt?(met?'bg-green-500':'bg-yellow-500'):'bg-slate-700'}`}></div>)}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const JournalApp = () => {
            const [isAuth, setAuth] = useState(false); const [pw, setPw] = useState('');
            const [records, setRecords] = useState([]); const [user, setUser] = useState(null);
            const [err, setErr] = useState(null); const [tab, setTab] = useState('entries');

            useEffect(() => {
                const auth = window.FB_AUTH;
                if(!auth) return;
                window.FB_METHODS.signInAnonymously(auth).catch(e=>setErr(e.message));
                return window.FB_METHODS.onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if(!user || !window.FB_DB) return;
                const col = window.FB_METHODS.collection(window.FB_DB, 'artifacts', window.FB_APP_ID, 'public', 'data', 'journal');
                return window.FB_METHODS.onSnapshot(col, s => {
                    setRecords(s.docs.map(d => ({id: d.id, ...d.data()})));
                }, e => console.error(e));
            }, [user]);

            const saveRec = async (id, data) => {
                const col = window.FB_METHODS.collection(window.FB_DB, 'artifacts', window.FB_APP_ID, 'public', 'data', 'journal');
                if(id) await window.FB_METHODS.updateDoc(window.FB_METHODS.doc(col, id), data);
                else await window.FB_METHODS.addDoc(col, data);
            };
            const delRec = async (id) => {
                const docRef = window.FB_METHODS.doc(window.FB_METHODS.collection(window.FB_DB, 'artifacts', window.FB_APP_ID, 'public', 'data', 'journal'), id);
                await window.FB_METHODS.deleteDoc(docRef);
            };

            if(!isAuth) return (
                <div className="flex justify-center h-[50vh] items-center">
                    <div className="bg-slate-800 p-8 rounded-xl border border-slate-700 flex flex-col items-center">
                        <div className="bg-slate-900 p-3 rounded-full mb-4 border border-slate-700"><Icons.Lock sz={24} cls="text-blue-500"/></div>
                        <h3 className="font-bold text-white mb-4">解鎖雲端紀錄簿</h3>
                        <form onSubmit={e=>{e.preventDefault(); if(pw==='8259') setAuth(true); else alert('密碼錯誤');}} className="flex gap-2">
                            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} className="bg-slate-700 border-slate-600 rounded px-3 py-1.5 text-white text-sm outline-none" autoFocus/>
                            <button className="bg-blue-600 px-3 rounded text-white"><Icons.Arrow sz={16}/></button>
                        </form>
                        {err ? <p className="mt-4 text-[10px] text-red-500">錯誤: {err}</p> : <p className="mt-4 text-[10px] text-slate-500">{user?'● 雲端連線就緒':'○ 連線中...'}</p>}
                    </div>
                </div>
            );

            return (
                <div className="space-y-4">
                    <div className="flex space-x-2 border-b border-slate-800 pb-2">
                        <button onClick={()=>setTab('entries')} className={`px-4 py-2 rounded-t-lg text-sm font-bold flex items-center ${tab==='entries'?'bg-slate-800 text-white':'text-slate-500'}`}><Icons.List sz={14} cls="mr-2"/>帳務明細</button>
                        <button onClick={()=>setTab('analysis')} className={`px-4 py-2 rounded-t-lg text-sm font-bold flex items-center ${tab==='analysis'?'bg-slate-800 text-white':'text-slate-500'}`}><Icons.Bar sz={14} cls="mr-2"/>成效分析</button>
                        <button onClick={()=>setTab('goals')} className={`px-4 py-2 rounded-t-lg text-sm font-bold flex items-center ${tab==='goals'?'bg-slate-800 text-white':'text-slate-500'}`}><Icons.Target sz={14} cls="mr-2"/>達陣目標</button>
                    </div>
                    {tab==='entries' && <JournalEntries records={records} onSave={saveRec} onDel={delRec} />}
                    {tab==='analysis' && <JournalAnalysis records={records} />}
                    {tab==='goals' && <JournalGoals records={records} />}
                </div>
            );
        };

        const TradingAssistant = () => {
            const [activeTab, setActiveTab] = useState('tech');

            // --- 測幅 ---
            const [h1, sH1] = useState(''); const [n1, sN1] = useState(''); const hd=h1&&n1?parseFloat(h1)-parseFloat(n1):0;
            const [w1, sW1] = useState(''); const [n2, sN2] = useState(''); const wd=w1&&n2?parseFloat(n2)-parseFloat(w1):0;
            const [nl1, sNl1] = useState(''); const [nh1, sNh1] = useState(''); const [nl2, sNl2] = useState(''); const nd=nl1&&nh1?parseFloat(nh1)-parseFloat(nl1):0;
            const [rh1, sRh1] = useState(''); const [rl1, sRl1] = useState(''); const [rh2, sRh2] = useState(''); const rd=rh1&&rl1?parseFloat(rh1)-parseFloat(rl1):0;

            // --- 斐波那契 ---
            const [fbL, setFbL] = useState(''); const [fbH, setFbH] = useState(''); const bR = fbH&&fbL?parseFloat(fbH)-parseFloat(fbL):0;
            const [frH, setFrH] = useState(''); const [frL, setFrL] = useState(''); const rR = frH&&frL?parseFloat(frH)-parseFloat(frL):0;

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 p-4 font-sans">
                    <div className="max-w-5xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-4">
                            <div><h1 className="text-xl md:text-2xl font-bold text-white">TopstepX 當沖戰情室</h1><p className="text-[10px] text-slate-500">v5.1 (Cloud Sync / ES5 Safe)</p></div>
                            <div className="flex bg-slate-900 p-1 rounded-lg mt-3 md:mt-0 border border-slate-800">
                                <button onClick={()=>setActiveTab('tech')} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center ${activeTab==='tech'?'bg-blue-600 text-white':'text-slate-500 hover:text-slate-300'}`}><Icons.Chart sz={14} cls="mr-1"/>測幅圖形</button>
                                <button onClick={()=>setActiveTab('mnq')} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center ${activeTab==='mnq'?'bg-green-600 text-white':'text-slate-500 hover:text-slate-300'}`}><Icons.Dollar sz={14} cls="mr-1"/>損益算盤</button>
                                <button onClick={()=>setActiveTab('journal')} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center ${activeTab==='journal'?'bg-purple-600 text-white':'text-slate-500 hover:text-slate-300'}`}><Icons.Pie sz={14} cls="mr-1"/>投資紀錄</button>
                            </div>
                        </div>

                        {activeTab === 'tech' && (
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                <PatternCard title="頭肩頂 (空)" 
                                    inputs={[{ l:"頭部", v:h1, s:sH1 },{ l:"頸線", v:n1, s:sN1 }]} 
                                    results={[{ l:"一倍滿足", v:hd?parseFloat(n1)-hd:null, color:"blue" },{ l:"二倍滿足", v:hd?parseFloat(n1)-2*hd:null, color:"purple" }]}
                                    svgContent={<svg viewBox="0 0 200 100" className="w-full h-full stroke-red-400 stroke-2 fill-none"><path d="M10,80 L40,50 L60,80 L100,20 L140,80 L160,50 L190,80" /><line x1="10" y1="80" x2="190" y2="80" className="stroke-slate-700 stroke-1 stroke-dasharray-4" /></svg>} />
                                
                                <PatternCard title="W 底 (多)" 
                                    inputs={[{ l:"底部", v:w1, s:sW1 },{ l:"頸線", v:n2, s:sN2 }]} 
                                    results={[{ l:"一倍滿足", v:wd?parseFloat(n2)+wd:null, color:"blue" },{ l:"二倍滿足", v:wd?parseFloat(n2)+2*wd:null, color:"purple" }]}
                                    svgContent={<svg viewBox="0 0 200 100" className="w-full h-full stroke-green-400 stroke-2 fill-none"><path d="M10,20 L40,80 L100,40 L160,80 L190,20" /><line x1="10" y1="40" x2="190" y2="40" className="stroke-slate-700 stroke-1 stroke-dasharray-4" /></svg>} />
                                
                                <PatternCard title="N 字 (多)" 
                                    inputs={[{ l:"起漲", v:nl1, s:sNl1 },{ l:"波高", v:nh1, s:sNh1 },{ l:"回調", v:nl2, s:sNl2 }]} 
                                    results={[{ l:"一倍滿足", v:nd&&nl2?parseFloat(nl2)+nd:null, color:"blue" },{ l:"二倍滿足", v:nd&&nl2?parseFloat(nl2)+2*nd:null, color:"purple" }]}
                                    svgContent={<svg viewBox="0 0 200 100" className="w-full h-full stroke-blue-400 stroke-2 fill-none"><path d="M10,80 L80,20 L120,60 L190,0" /></svg>} />
                                
                                <PatternCard title="倒 N 字 (空)" 
                                    inputs={[{ l:"起跌", v:rh1, s:sRh1 },{ l:"波低", v:rl1, s:sRl1 },{ l:"反彈", v:rh2, s:sRh2 }]} 
                                    results={[{ l:"一倍滿足", v:rd&&rh2?parseFloat(rh2)-rd:null, color:"blue" },{ l:"二倍滿足", v:rd&&rh2?parseFloat(rh2)-2*rd:null, color:"purple" }]}
                                    svgContent={<svg viewBox="0 0 200 100" className="w-full h-full stroke-red-400 stroke-2 fill-none"><path d="M10,20 L80,80 L120,40 L190,100" /></svg>} />
                                
                                <PatternCard isGrid={false} title="回檔 (找支撐)" 
                                    inputs={[{ l:"波段Low", v:fbL, s:setFbL },{ l:"波段High", v:fbH, s:setFbH }]}
                                    results={bR>0 ? [{ l:'0.382 弱回檔', v:parseFloat(fbH)-bR*0.382, hl:true }, { l:'0.500 中關', v:parseFloat(fbH)-bR*0.5 }, { l:'0.618 強回檔', v:parseFloat(fbH)-bR*0.618, hl:true }] : []}
                                    svgContent={<svg viewBox="0 0 200 100" className="w-full h-full fill-none"><path d="M10,90 L100,10 L140,40 L190,15" className="stroke-green-400 stroke-2" /><line x1="100" y1="40" x2="190" y2="40" className="stroke-yellow-500 stroke-1 stroke-dasharray-2" /><text x="140" y="55" className="fill-yellow-500 text-[10px] font-bold" textAnchor="middle">0.382</text></svg>} />

                                <PatternCard isGrid={false} title="反彈 (找壓力)" 
                                    inputs={[{ l:"波段High", v:frH, s:setFrH },{ l:"波段Low", v:frL, s:setFrL }]}
                                    results={rR>0 ? [{ l:'0.618 強反彈', v:parseFloat(frL)+rR*0.618, hl:true }, { l:'0.500 中關', v:parseFloat(frL)+rR*0.5 }, { l:'0.382 弱反彈', v:parseFloat(frL)+rR*0.382, hl:true }] : []}
                                    svgContent={<svg viewBox="0 0 200 100" className="w-full h-full fill-none"><path d="M10,10 L100,90 L140,60 L190,85" className="stroke-red-400 stroke-2" /><line x1="100" y1="60" x2="190" y2="60" className="stroke-yellow-500 stroke-1 stroke-dasharray-2" /><text x="140" y="50" className="fill-yellow-500 text-[10px] font-bold" textAnchor="middle">0.382</text></svg>} />
                            </div>
                        )}
                        {activeTab === 'mnq' && <MNQCalculator />}
                        {activeTab === 'journal' && <JournalApp />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradingAssistant />);
    </script>
</body>
</html>
